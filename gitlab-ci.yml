stages:
  - convention-check
  - lint

# 1. MR 제목에 OKA 이슈 키가 있는지 검사
check-mr-title:
  stage: convention-check
  image: alpine:latest
  script:
    - |
      if [ -z "$CI_MERGE_REQUEST_IID" ]; then
        echo "이 작업은 Merge Request 환경에서만 동작합니다."
        exit 0
      fi
      if [[ ! "$CI_MERGE_REQUEST_TITLE" =~ OKA-[0-9]+ ]]; then
        echo "❌ [ERROR] MR 제목에 Jira 이슈 키(예: OKA-123)를 포함해주세요."
        exit 1
      fi
      echo "✅ MR 제목 검사 통과: $CI_MERGE_REQUEST_TITLE"
  only:
    - merge_requests

# 2. Terraform 코드 스타일 및 문법 검사
terraform-lint:
  stage: lint
  image:
    name: hashicorp/terraform:light
    entrypoint: [""]
  script:
    - terraform init -backend=false
    - terraform fmt -check -recursive
    - terraform validate
  rules:
    - if: $CI_MERGE_REQUEST_IID  # MR 상태에서만 실행
      changes:                   # 아래 확장자나 폴더 내 파일이 바뀔 때만!
        - "**/*.tf"
        - "**/*.tfvars"
        - "terraform/**/*"

# 3. Kubernetes 매니페스트 린트
k8s-lint:
  stage: lint
  image: stackrox/kube-linter:latest-alpine
  script:
    - /kube-linter lint k8s-manifests/
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:                   # k8s-manifests 폴더 내 모든 파일 감시
        - "k8s-manifests/**/*"